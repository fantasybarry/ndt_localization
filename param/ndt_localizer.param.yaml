/**:
  ros__parameters:
    map_frame: "map"
    base_frame: "base_link"

    # NDT optimizer (PCL NormalDistributionsTransform)
    max_iterations: 30
    step_size: 0.1
    epsilon: 0.001
    ndt_resolution: 3.0
    score_threshold: 30.0

    # Scan preprocessing
    scan_voxel_leaf_size: 2.0

    # Predict-pose threshold: reject NDT results deviating more than this (meters)
    predict_pose_threshold: 15.0

    # Sensor fusion
    use_imu: true
    use_odom: false
    imu_upside_down: false

    # GNSS re-initialization threshold
    gnss_reinit_fitness: 500.0

    # base_link -> lidar static transform
    tf_x: 0.0
    tf_y: 0.0
    tf_z: 0.0
    tf_roll: 0.0
    tf_pitch: 0.0
    tf_yaw: 0.0

    # NDT reliability metric weights
    reliability_wa: 0.4
    reliability_wb: 0.3
    reliability_wc: 0.3
