/**:
  ros__parameters:
    map_frame: "map"
    base_frame: "base_link"

    # Optimizer
    max_iterations: 30
    step_size: 1.0
    epsilon: 0.0001
    score_threshold: 2.0

    # Scan
    scan_capacity: 55000
    search_radius: 2.0

    # GNSS regularization
    regularization_scale: 0.01

    # Sensor fusion
    use_imu: false
    use_odom: false
    imu_upside_down: false

    # GNSS re-initialization threshold
    gnss_reinit_fitness: 500.0

    # base_link -> lidar static transform
    tf_x: 0.0
    tf_y: 0.0
    tf_z: 0.0
    tf_roll: 0.0
    tf_pitch: 0.0
    tf_yaw: 0.0

    # NDT reliability metric weights
    reliability_wa: 0.4
    reliability_wb: 0.3
    reliability_wc: 0.3

    # NDT map voxel grid
    map:
      min_x: -500.0
      min_y: -500.0
      min_z: -10.0
      max_x: 500.0
      max_y: 500.0
      max_z: 50.0
      voxel_x: 1.0
      voxel_y: 1.0
      voxel_z: 1.0
      capacity: 1000000
